version: '3.8'

services:
  app:
    build: .
    container_name: devops-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/devopsdb
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - devops-network

  mongo:
    image: mongo:6.0
    container_name: devops-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - devops-network

networks:
  devops-network:
    driver: bridge

volumes:
  mongo-data: