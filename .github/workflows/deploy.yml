name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: '18'
    - run: npm install
    - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker image
      run: docker build -t devops-app:${{ github.sha }} .
    - name: Tag as latest
      run: docker tag devops-app:${{ github.sha }} devops-app:latest
    - name: Verify build
      run: docker images
    - name: Rollback info
      if: failure()
      run: |
        echo "Build failed!"
        echo "Rolling back to previous version"
        echo "Previous SHA: ${{ github.event.before }}"